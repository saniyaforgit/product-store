<section id="loginScreen" class="screen">
  <h2>Login</h2>
  <input id="username">
  <input id="password" type="password">
  <button id="loginBtn">Войти</button>
</section>

<section id="profileScreen" class="screen hidden">
  <h2>Profile</h2>
  <div id="profileInfo"></div>

  <button id="goToProductsBtn">Товары</button>
  <button id="logoutBtn">Выйти</button>
</section>

<section id="productsScreen" class="screen hidden">
  <h2>Products</h2>

  <input id="searchInput">
  <button id="searchBtn">Найти</button>

  <div id="products"></div>

  <button id="backToProfileBtn">Профиль</button>
</section>

<section id="detailScreen" class="screen hidden">
  <h2>Product detail</h2>
  <div id="productDetail"></div>

  <button id="backToProductsBtn">Назад</button>
</section>
